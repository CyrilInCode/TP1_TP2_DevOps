name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-tp1:
    name: TP1 - HelloService
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build HelloService
        run: |
          cd ./tp1/HelloService
          chmod +x gradlew
          ./gradlew build

      - name: Build Docker image (TP1)
        run: |
          docker build -t helloservice:latest ./tp1/HelloService

  build-tp2:
    name: TP2 - MyService
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build MyService
        run: |
          cd ./tp2/MyService
          chmod +x gradlew
          ./gradlew build

      - name: Build Docker image (TP2)
        run: |
          docker build -t myservice:latest ./tp2/MyService

  build-tp3:
    name: TP3 - MyService (JUnit Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run tests
        run: |
          cd ./tp3/MyService
          chmod +x gradlew
          ./gradlew test
